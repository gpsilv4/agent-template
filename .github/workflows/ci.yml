name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# NOTE: Dependabot PRs run on `pull_request` with a read-only token and NO repo
# secrets (GitHub's safe default). That is fine here because no CI step below needs
# secrets. If a project's build genuinely needs secrets on Dependabot PRs, add a
# separate, carefully-scoped `pull_request_target` job at bootstrap — do not make it
# the default (it runs untrusted PR code with a privileged token).

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.head.ref || github.ref }}
  cancel-in-progress: true

# Least privilege: no job here writes to the repo.
permissions:
  contents: read

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Skip on the bare template repo (no package.json yet); runs on real projects.
    if: hashFiles('package.json') != ''
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      # Uncomment after configuring bundle targets in .agent/scripts/check-bundle-sizes.mjs
      # - name: Bundle Sizes
      #   run: node .agent/scripts/check-bundle-sizes.mjs

      # Uncomment to run doc guards: rules byte-budget, CLAUDE/GEMINI parity,
      # CHANGELOG/package.json version, banned terms, and (opt-in) dependency versions
      # - name: Doc Guards
      #   run: node .agent/scripts/check-doc-versions.mjs

      # Uncomment to validate backlog counters/progress bar and detect duplicate IDs
      # - name: Backlog Check
      #   run: node .agent/scripts/check-backlog.mjs

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: hashFiles('package.json') != ''
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Unit Tests
        run: npm run test:unit

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: hashFiles('package.json') != ''
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Audit
        run: npm audit --audit-level=high

  # Runs on every push/PR, including the bare template (no package.json guard):
  # scans the full history for committed secrets/keys.
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Organizations (not personal repos) need a free GITLEAKS_LICENSE:
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
