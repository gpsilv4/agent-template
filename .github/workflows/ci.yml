name: CI

on:
  pull_request:
    branches: [main]
  pull_request_target:
    branches: [main]
    types: [opened, synchronize]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.head.ref || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    # Skip on template repo (no package.json yet)
    # For dependabot: use pull_request_target (has secrets access)
    # For normal PRs: use pull_request
    if: >
      hashFiles('package.json') != '' && (
        github.event_name == 'push' ||
        (github.event_name == 'pull_request' && github.actor != 'dependabot[bot]') ||
        (github.event_name == 'pull_request_target' && github.actor == 'dependabot[bot]')
      )
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      # Uncomment after configuring bundle targets in .agent/scripts/check-bundle-sizes.mjs
      # - name: Bundle Sizes
      #   run: node .agent/scripts/check-bundle-sizes.mjs

      # Uncomment after configuring version checks in .agent/scripts/check-doc-versions.mjs
      # - name: Doc Versions
      #   run: node .agent/scripts/check-doc-versions.mjs

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    if: >
      hashFiles('package.json') != '' && (
        github.event_name == 'push' ||
        (github.event_name == 'pull_request' && github.actor != 'dependabot[bot]') ||
        (github.event_name == 'pull_request_target' && github.actor == 'dependabot[bot]')
      )
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Unit Tests
        run: npm run test:unit

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    if: >
      hashFiles('package.json') != '' && (
        github.event_name == 'push' ||
        (github.event_name == 'pull_request' && github.actor != 'dependabot[bot]') ||
        (github.event_name == 'pull_request_target' && github.actor == 'dependabot[bot]')
      )
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Audit
        run: npm audit --audit-level=high
