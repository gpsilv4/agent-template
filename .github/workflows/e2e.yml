name: E2E Tests

on:
  # Runs on PRs to main (optional — can be heavy)
  # pull_request:
  #   branches: [main]

  # Manual trigger for on-demand runs
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL to test against (leave empty for localhost)"
        required: false
        type: string

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run E2E Tests
        run: npm run test
        env:
          PLAYWRIGHT_BASE_URL: ${{ inputs.base_url || '' }}
          # Add test credentials as GitHub Secrets:
          # TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          # TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  security:
    name: Security Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run Security Tests
        run: npm run test:security
        env:
          PLAYWRIGHT_BASE_URL: ${{ inputs.base_url || '' }}
