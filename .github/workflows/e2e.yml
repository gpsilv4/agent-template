name: E2E Tests

on:
  # Manual trigger for on-demand runs
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL to test against (leave empty for localhost)"
        required: false
        type: string

  # Uncomment to run on PRs to main:
  # pull_request:
  #   branches: [main]

permissions:
  contents: read

concurrency:
  # Manual/on-demand runs (workflow_dispatch): NAO cancelar — dois dispatches com base_url
  # diferente na mesma ref nao se devem matar mutuamente.
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  # Detects package.json AFTER checkout (job-level hashFiles is unreliable — runs pre-checkout).
  detect:
    name: Detect Project
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      has_pkg: ${{ steps.check.outputs.has_pkg }}
    steps:
      - uses: actions/checkout@v7
      - id: check
        run: |
          if [ -f package.json ]; then echo "has_pkg=true" >> "$GITHUB_OUTPUT"; else echo "has_pkg=false" >> "$GITHUB_OUTPUT"; fi

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.has_pkg == 'true'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run E2E Tests
        run: npm run test
        env:
          PLAYWRIGHT_BASE_URL: ${{ inputs.base_url || '' }}
          # Add test credentials as GitHub Secrets:
          # TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          # TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  security:
    name: Security Tests
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.has_pkg == 'true'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run Security Tests
        run: npm run test:security
        env:
          PLAYWRIGHT_BASE_URL: ${{ inputs.base_url || '' }}
